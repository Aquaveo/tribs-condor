name: Commits without Tag

on:
  push:
    branches: [main]
    tags-ignore:
    - '**' # Ignore all tags
  pull_request:
    branches:
    - "*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'
      - name: Set Env
        run: echo "IMAGE=aquaveollc/tribs-condor" >> $GITHUB_ENV

      - name: Set Tag
        run: |
          TAG="dev-${GITHUB_SHA::8}"
          echo "TAG=$TAG" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_BUILDER_USERNAME }}
          password: ${{ secrets.DOCKER_BUILDER_TOKEN }}

      - name: Build and Push Dev
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.IMAGE }}:${{ env.TAG }}
          # GitHub Actions cache — survives across runs, no separate DockerHub
          # cache registry needed. Removes the memory pressure that was killing
          # the kaniko cache-push step.
          cache-from: type=gha
          cache-to: type=gha,mode=max