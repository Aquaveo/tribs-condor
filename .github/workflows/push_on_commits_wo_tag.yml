name: Commits without Tag

on:
  push:
    branches: [main]
    tags-ignore:
    - '**' # Ignore all tags
  pull_request:
    branches:
    - "*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'
      - name: Set Env
        run: echo "IMAGE=aquaveollc/tribs-condor" >> $GITHUB_ENV

      - name: Set Tag
        run: |
          TAG="dev-${GITHUB_SHA::8}"
          echo "TAG=$TAG" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_BUILDER_USERNAME }}
          password: ${{ secrets.DOCKER_BUILDER_TOKEN }}

      - name: Build and Push Dev
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.IMAGE }}:${{ env.TAG }}
          # GitHub Actions cache — survives across runs, no separate DockerHub
          # cache registry needed. Removes the memory pressure that was killing
          # the kaniko cache-push step.
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm-check:
    name: Check Helm Chart
    runs-on: ubuntu-latest
    env:
      HELM_CHART: helm/tribs-condor
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # need base branch history for the version-bump diff

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Helm Lint
        run: helm lint "$HELM_CHART"

      - name: Helm Package
        run: helm package "$HELM_CHART" --destination /tmp/helm-pkg

      - name: Enforce version bump
        # Ports check_helm_chart's intent: if chart files changed vs the PR's
        # base branch, Chart.yaml's `version:` must have been bumped too.
        if: github.event_name == 'pull_request'
        run: |
          BASE="origin/${{ github.base_ref }}"
          git fetch origin "${{ github.base_ref }}" --depth=1
          if git diff --quiet "$BASE" -- "$HELM_CHART/"; then
            echo "No chart changes vs $BASE — nothing to enforce."
            exit 0
          fi
          OLD_VER=$(git show "$BASE:$HELM_CHART/Chart.yaml" | awk '/^version:/ {print $2; exit}')
          NEW_VER=$(awk '/^version:/ {print $2; exit}' "$HELM_CHART/Chart.yaml")
          echo "Chart files changed. Old version: $OLD_VER, new version: $NEW_VER"
          if [ "$OLD_VER" = "$NEW_VER" ]; then
            echo "::error file=$HELM_CHART/Chart.yaml::Chart files changed but version is still $NEW_VER. Bump 'version:' in Chart.yaml."
            exit 1
          fi

  publish-helm:
    name: Publish Helm Chart
    needs: [helm-check]
    # Only publish on direct push to main; skip on PRs.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Publish chart to ghcr.io/aquaveo
        uses: bitdeps/helm-oci-charts-releaser@v0.1.4
        with:
          oci_registry: ghcr.io/aquaveo
          oci_username: aquaveo
          oci_password: ${{ secrets.GITHUB_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          charts_dir: helm
          skip_existing: true   # don't overwrite a published version
          skip_gh_release: true # commits fire often; don't spam Releases
