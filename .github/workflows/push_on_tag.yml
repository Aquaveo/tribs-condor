name: Release on Tag

# Push to docker hub if tag has been created.
on:
  push:
    tags:
      - '*'

jobs:
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Set Env
        run: echo "IMAGE=aquaveollc/tribs-condor" >> $GITHUB_ENV

      - name: Set Tag
        run: |
          TAG="${GITHUB_REF:10}"
          echo "TAG=$TAG" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_BUILDER_USERNAME }}
          password: ${{ secrets.DOCKER_BUILDER_TOKEN }}

      - name: Build and Push Tag
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.IMAGE }}:${{ env.TAG }}
          # GitHub Actions cache — survives across runs
          cache-from: type=gha
          cache-to: type=gha,mode=max
