# Default values for condor-manager.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

nameOverride: ''
fullnameOverride: ''

service:
  type: ClusterIP
  port: 9618

secrets:
  condor_pool_password: ''
  authorized_keys: ''
  condor_private_key: ''

scheduler:
  name: condor-scheduler
  image:
    repository: your-registry.example.com/your-org/condor-scheduler  # TODO update to correct repo when published
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP # You can change this to NodePort or LoadBalancer as needed
    ports:
    - name: ssh
      port: 22
      targetPort: 22
      protocol: TCP

    - name: condor
      port: 9618
      targetPort: 9618
      protocol: TCP
  imagePullSecrets:
  - name: github-registry
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1
      memory: 1Gi
  nodeSelector: {}
  tolerations: []
  affinity: {}

collector:
  image:
    repository: aquaveollc/tribs-condor
    tag: latest
    pullPolicy: Always
  imagePullSecrets:
  - name: github-registry
  service:
    type: ClusterIP # You can change this to NodePort or LoadBalancer as needed
    ports:
    - name: ssh
      port: 22
      targetPort: 22
      protocol: TCP

    - name: condor
      port: 9618
      targetPort: 9618
      protocol: TCP

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1
      memory: 1Gi
  nodeSelector: {}
  tolerations: []
  affinity: {}

scalecon:
  image:
    repository: your-registry.example.com/your-org/condor-scalecon  # TODO update to correct repo when published
    tag: latest
    pullPolicy: Always
  imagePullSecrets:
  - name: github-registry
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1
      memory: 1Gi
  env:
    _CONDOR_CONDOR_HOST:
      value: 'condor-collector'
    _CONDOR_SEC_PASSWORD_FILE:
      value: '/etc/condor/pool_password/password'
    HTCONDOR_LABEL_SELECTOR:
      value: 'app=condor-worker'
    HTCONDOR_POD_TEMPLATE:
      value: /data/worker.json
    HTCONDOR_MAX_WORKERS:
      value: '5'
    HTCONDOR_MAX_WORKERS_PER_CYCLE:
      value: '3'
    HTCONDOR_POD_NAME:
      value: 'condor-worker'
  nodeSelector: {}
  tolerations: []
  affinity: {}

worker:
  image:
    repository: aquaveollc/tribs-condor
    tag: v0.0.42
    pullPolicy: Always
  storageClass:
    enabled: false
    storageClassName: tribs-storage
    workspace_size: 1Gi
  persistentVolumeClaim:
    accessModes:
    - ReadWriteOnce
    name: condor-workers-pvc
  nodeSelector:
    node.kubernetes.io/instance-type: e2-standard-8
  tolerations: []
  affinity: {}

  imagePullSecrets:
  - name: github-registry

  condor_fdb_root:
    mountPath: /fdbs

  condor_proj_lib: /var/lib/condor/micromamba/envs/tethys/share/proj/

  resources:
    requests:
      cpu: 1
      memory: 2000Mi
    limits:
      cpu: 2
      memory: 2000Mi
