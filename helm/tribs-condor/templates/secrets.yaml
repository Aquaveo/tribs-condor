# secrets
apiVersion: v1
data:
  authorized_keys: {{ .Values.secrets.authorized_keys }}
kind: Secret
metadata:
  name: condor-authorized-keys
type: Opaque
---
apiVersion: v1
data:
  condorkey-root: {{ .Values.secrets.condor_private_key }}
kind: Secret
metadata:
  name: condor-ssh-key
type: Opaque
---
apiVersion: v1
data:
  password: {{ .Values.secrets.condor_pool_password }}
kind: Secret
metadata:
  name: condor-pool-password
type: Opaque
