apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: {{ .Release.Namespace }}
  name: pod-manager
rules:
  - apiGroups: ['']
    resources: ['pods']
    verbs: ['get', 'list', 'create', 'watch', 'delete', 'patch']
  - apiGroups: ['']
    resources: ['configmaps']
    verbs: ['get', 'create', 'update', 'delete', 'patch']
